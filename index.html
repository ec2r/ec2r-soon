<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>EC2R — Bientôt</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            padding: 40px;
            max-width: 500px;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #002060;
            letter-spacing: 0.08em;
            margin-bottom: 32px;
        }
        .message {
            font-size: 1.125rem;
            font-weight: 300;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .contact {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.4);
        }
        .contact a {
            color: #1B5FEB;
            text-decoration: none;
        }
        .contact a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">EC2R</div>
        <p class="message">Notre site est en cours de construction.<br>Nous serons bientôt en ligne.</p>
        <p class="contact"><a href="mailto:contact@methode-ec2r.com">contact@methode-ec2r.com</a></p>
    </div>
</body>
</html>
